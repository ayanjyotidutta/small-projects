<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Realistic Minimalist 3D Pi Spiral</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #fdfdfd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .controls label {
            font-weight: bold;
            color: #333;
            margin-right: 8px;
        }

        input[type=range] {
            vertical-align: middle;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="controls">
        <label>Spawn Delay:</label>
        <input type="range" id="speedRange" min="1" max="50" value="10">
        <span id="speedVal">10ms</span>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const speedInput = document.getElementById("speedRange");
        const speedDisplay = document.getElementById("speedVal");

        // CONFIGURATION
        const dotRadius = 10;      // Size of the spheres
        const spacing = 2 * dotRadius;       // Gap between spheres
        let spawnRate = 10; // Speed in milliseconds (can be changed by slider)

        // Vibrant, Unique Color Map for digits 0-9
        const ballColors = [
            "#FF789B", // 0
            "#007873", // 1
            "#82DC73", // 2
            "#4BC3AF", // 3
            "#0FA069", // 4
            "#C8870A", // 5
            "#C3325F", // 6
            "#0F5FDC", // 7
            "#5F1EBE", // 8
            "#411482"  // 9
        ];

        const piStr = "\u03C0" + "3141592653589793238462643383279502884197169399375105820974944592307816406286208998628034825342117067982148086513282306647093844609550582231725359408128481117450284102701938521105559644622948954930381964428810975665933446128475648233786783165271201909145648566923460348610454326648213393607260249141273724587006606315588174881520920962829254091715364367892590360011330530548820466521384146951941511609433057270365759591953092186117381932611793105118548074462379962749567351885752724891227938183011949129833673362440656643086021394946395224737190702179860943702770539217176293176752384674818467669405132000568127145263560827785771342757789609173637178721468440901224953430146549585371050792279689258923542019956112129021960864034418159813629774771309960518707211349999998372978049951059731732816096318595024459455346908302642522308253344685035261931188171010003137838752886587533208381420617177669147303598253490428755468731159562863882353787593751957781857780532171226806613001927876611195909216420198938095257201065485863278865936153381827968230301952035301852968995773622599413891249721775283479131515574857242454150695950829533116861727855889075098381754637464939319255060400927701671139009848824012858361603563707660104710181942955596198946767837449448255379774726847104047534646208046684259069491293313677028989152104752162056966024058038150193511253382430035587640247496473263914199272604269922796782354781636009341721641219924586315030286182974555706749838505494588586926995690927210797509302955321165344987202755960236480665499119881834797753566369807426542527862551818417574672890977772793800081647060016145249192173217214772350141441973568548161361157352552133475741849468438523323907394143334547762416862518983569485562099219222184272550254256887671790494601653466804988627232791786085784383827967976681454100953883786360950680064225125205117392984896084128488626945604241965285022210661186306744278622039194945047123713786960956364371917287467764657573962413890865832645995813390478027590099465764078951269468398352595709825822620522489407726719478268482601476990902640136394437455305068203496252451749399651431429809190659250937221696461515709858387410597885959772975498930161753928468138268683868942774155991855925245953959431049972524680845987273644695848653836736222626099124608051243884390451244136549762780797715691435997700129616089441694868555848406353422072225828488648158456028506016842739452267467678895252138522549954666727823986456596116354886230577456498035593634568174324112515076069479451096596094025228879710893145669136867228748940560101503308617928680920874760917824938589009714909675985261365549781893129784821682998948722658804857564014270477555132379641451523746234364542858444795265867821051141354735739523113427166102135969536231442952484937187110145765403590279934403742";

        let centerX, centerY;
        let dots = [];
        let currentIndex = 0;
        let totalDistance = 0;
        let lastSpawnTime = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
        }

        window.addEventListener("resize", resize);
        speedInput.addEventListener("input", (e) => {
            spawnRate = parseInt(e.target.value);
            speedDisplay.innerText = spawnRate + "ms";
        });

        resize();

        // Custom function for rendering a realistic sphere with minimal, matte texture
        function drawRealisticBall(x, y, digit) {
            const dInt = parseInt(digit);
            // Handle the π symbol (isNaN) with a specific color, others use the array
            const baseColor = isNaN(dInt) ? "#FFD700" : ballColors[dInt];

            // 1. Draw the Base Shape
            ctx.beginPath();
            ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
            ctx.fillStyle = baseColor;
            ctx.fill();
            ctx.closePath();

            // 2. MATTE FINISH: Soft Diffuse Shading
            // Instead of a glossy highlight, we use a large, soft light-to-dark 
            // gradient that covers most of the ball to simulate matte diffusion.
            const matteGrad = ctx.createRadialGradient(
                x - dotRadius * 0.4, y - dotRadius * 0.4, dotRadius * 0.2,
                x, y, dotRadius * 1.5
            );

            // Lightest part of the matte surface
            matteGrad.addColorStop(0, 'rgba(255, 255, 255, 0.35)');
            // The natural color area
            matteGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0)');
            // The soft shadow side (no harsh black)
            matteGrad.addColorStop(1, 'rgba(0, 0, 0, 0.2)');

            ctx.beginPath();
            ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
            ctx.fillStyle = matteGrad;
            ctx.fill();
            ctx.closePath();

            // 3. Text styling
            ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
            ctx.font = `bold ${dotRadius * 1.1}px Segoe UI, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Subtle "etched" look for the digit
            ctx.shadowColor = "rgba(0, 0, 0, 0.2)";
            ctx.shadowBlur = 1;
            ctx.fillText(digit, x, y);

            // Reset shadows for next frame performance
            ctx.shadowColor = "transparent";
            ctx.shadowBlur = 0;
        }

        function animate(currentTime) {
            if (currentTime - lastSpawnTime > spawnRate) {
                if (currentIndex < piStr.length) {
                    // Archimedean Spiral Math
                    const angle = Math.sqrt(4 * totalDistance / (spacing / Math.PI));
                    const radius = (spacing / (2 * Math.PI)) * angle;

                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    dots.push({ x, y, digit: piStr[currentIndex] });

                    totalDistance += spacing;
                    currentIndex++;
                    lastSpawnTime = currentTime;
                }
            }

            // Clear and redraw
            ctx.fillStyle = "#fdfdfd";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw all spheres in their calculated order
            dots.forEach(dot => {
                drawRealisticBall(dot.x, dot.y, dot.digit);
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>

</body>

</html>
